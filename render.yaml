services:
  - type: web
    name: my-chef-ai-agent
    env: python
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PORT
        value: "8000"
      - key: MODEL_NAME
        value: "gemini-3.1-flash-lite-preview"
      # 以下為敏感變數，請在 Render Dashboard 中手動輸入，不要寫死在這裡
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: LINE_CHANNEL_SECRET
        sync: false
      # Render Postgres：在 Dashboard Link Database 後會自動帶入 DATABASE_URL；亦可手動貼 Internal URL
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: IMAGE_PROVIDER
        sync: false
      - key: IMAGE_OPENAI_API_KEY
        sync: false
      - key: PUBLIC_APP_BASE_URL
        sync: false
      - key: AI_IMAGE_TIMEOUT_SEC
        sync: false
      - key: IMAGE_CACHE_TTL_SEC
        sync: false
      - key: RECIPE_IMAGE_STORAGE_BACKEND
        sync: false
      - key: RECIPE_IMAGE_GCS_BUCKET
        sync: false
      - key: RECIPE_IMAGE_GCS_PREFIX
        sync: false
      - key: RECIPE_IMAGE_GCS_SIGNED_URL_TTL_SEC
        sync: false
