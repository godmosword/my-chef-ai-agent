name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: chef_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d chef_agent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      LINE_CHANNEL_ACCESS_TOKEN: test_token
      LINE_CHANNEL_SECRET: test_secret
      GEMINI_API_KEY: test_key
      METRICS_TOKEN: test_metrics_token
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/chef_agent

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Apply migrations
        run: |
          python - <<'PY'
          import os
          from pathlib import Path
          import psycopg

          db_url = os.environ["DATABASE_URL"]
          sql = Path("migrations/20260414_postgres_multitenant.sql").read_text(encoding="utf-8")
          with psycopg.connect(db_url, autocommit=True) as conn:
              with conn.cursor() as cur:
                  cur.execute(sql)
          print("migrations applied")
          PY

      - name: Run test suite
        run: python -m pytest tests/ -v

  # 僅在 push 到 main 時執行；同一 workflow 內接在 test 之後，避免與 CI 各跑一套重複排程
  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    concurrency:
      group: cloud-run-deploy-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: false
    permissions:
      contents: read
      id-token: write

    steps:
      - name: 1. Checkout Code (取得程式碼)
        uses: actions/checkout@v6

      - name: 2. Validate Secrets (檢查必要金鑰)
        run: |
          if [ -z "${{ secrets.GEMINI_API_KEY }}" ]; then
            echo "::error::GEMINI_API_KEY 未設定。請至 GitHub → Settings → Secrets → Actions 新增 GEMINI_API_KEY（從 https://aistudio.google.com/apikey 取得）"
            exit 1
          fi
          echo "Secrets validated."

      - name: 3. Authenticate to GCP (登入 Google Cloud)
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 4. Deploy to Cloud Run (打包並部署到 Cloud Run)
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v3
        with:
          service: ${{ secrets.CLOUD_RUN_SERVICE }}
          region: ${{ secrets.CLOUD_RUN_REGION }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          source: .
          flags: --allow-unauthenticated --no-cpu-throttling
          env_vars: |
            LINE_CHANNEL_ACCESS_TOKEN=${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
            LINE_CHANNEL_SECRET=${{ secrets.LINE_CHANNEL_SECRET }}
            MODEL_NAME=gemini-3.1-pro-preview
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: 5. Output Service URL
        run: echo "Deployed to ${{ steps.deploy.outputs.url }}"
