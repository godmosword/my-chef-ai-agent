<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rich Menu 預覽 · 米其林職人大腦</title>
  <style>
    :root {
      --bg: #0f172a;
      --muted: #94a3b8;
      --accent: #22d3ee;
    }
    body {
      font-family: ui-sans-serif, system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: #e2e8f0;
    }
    h1 { font-size: 1.15rem; font-weight: 600; margin: 0 0 8px; }
    p.meta { font-size: 13px; color: var(--muted); margin: 0 0 16px; max-width: 52rem; line-height: 1.5; }
    .frame {
      position: relative;
      display: inline-block;
      max-width: min(100%, 960px);
      line-height: 0;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
    }
    .frame img {
      width: 100%;
      height: auto;
      display: block;
      vertical-align: top;
    }
    .hit {
      position: absolute;
      box-sizing: border-box;
      border: 2px solid var(--accent);
      background: rgba(34, 211, 238, 0.1);
      pointer-events: none;
    }
    .hit .tag {
      position: absolute;
      left: 4px;
      top: 4px;
      font-size: 11px;
      line-height: 1.3;
      background: rgba(15, 23, 42, 0.92);
      color: #f8fafc;
      padding: 4px 8px;
      border-radius: 6px;
      max-width: calc(100% - 12px);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    code { font-size: 12px; background: #1e293b; padding: 2px 6px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>LINE Rich Menu 預覽</h1>
  <p class="meta">
    圖檔：<code>richmenu.jpg</code>（與本檔相對路徑 <code>../richmenu.jpg</code>）。青框為
    <code>richmenu_config.json</code> 的 <code>areas[].bounds</code>。若圖片破圖，請從專案根目錄執行
    <code>python3 -m http.server 8765</code> 後開啟
    <code>http://localhost:8765/docs/preview_richmenu.html</code>。
  </p>
  <div class="frame" id="frame">
    <img src="../richmenu.jpg" alt="Rich menu" width="2500" height="1686" />
  </div>
  <script>
    // 與 richmenu_config.json 同步（預覽用）
    const SIZE = { width: 2500, height: 1686 };
    const AREAS = [
      { bounds: { x: 8, y: 138, width: 822, height: 766 }, label: "主選單", text: "選單" },
      { bounds: { x: 838, y: 138, width: 822, height: 766 }, label: "隨機配菜", text: "🍳 隨機配菜" },
      { bounds: { x: 1668, y: 138, width: 822, height: 766 }, label: "我的最愛", text: "我的最愛" },
      { bounds: { x: 8, y: 912, width: 822, height: 766 }, label: "清冰箱模式", text: "清冰箱模式" },
      { bounds: { x: 838, y: 912, width: 822, height: 766 }, label: "預算方案", text: "幫我規劃預算食譜" },
      { bounds: { x: 1668, y: 912, width: 822, height: 766 }, label: "查看採買清單", text: "🛒 檢視清單" },
    ];
    const W = SIZE.width;
    const H = SIZE.height;
    const frame = document.getElementById("frame");
    AREAS.forEach((a) => {
      const b = a.bounds;
      const el = document.createElement("div");
      el.className = "hit";
      el.style.left = (100 * b.x / W) + "%";
      el.style.top = (100 * b.y / H) + "%";
      el.style.width = (100 * b.width / W) + "%";
      el.style.height = (100 * b.height / H) + "%";
      const tag = document.createElement("span");
      tag.className = "tag";
      tag.textContent = a.label + " → " + a.text;
      el.appendChild(tag);
      frame.appendChild(el);
    });
  </script>
</body>
</html>
